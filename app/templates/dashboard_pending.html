{% extends "base.html" %}
{% block title %}Generating — MoneySaarthi{% endblock %}
{% block content %}
  <h1>Building your report…</h1>
  <p>This usually takes about a minute. The page will update automatically.</p>
  <div id="status">queued</div>
{% endblock %}
{% block scripts %}
<script>
  const jobId = new URLSearchParams(location.search).get('job');
  async function poll() {
    if (!jobId) return;
    const r = await fetch(`/jobs/${jobId}/status`);
    const { status } = await r.json();
    document.getElementById('status').textContent = status;
    if (status === 'complete') location.href = '/dashboard';
    else if (status !== 'failed') setTimeout(poll, 3000);
  }
  poll();
</script>
{% endblock %}
